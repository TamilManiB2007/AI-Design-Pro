kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/api-server", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

[services.production.run.env]
PORT = "8080"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"

[[services]]
localPort = 8000
name = "SENTINEL-G Engine"
paths = ["/engine-api"]

[services.development]
run = "bash /home/runner/workspace/artifacts/sentinel-api/start.sh"

[services.production]

[services.production.run]
args = ["bash", "/home/runner/workspace/artifacts/sentinel-api/start.sh"]

[services.production.health.startup]
path = "/engine-api/healthz"
